{% extends "base.html" %}
{% block title %}Login - ExtratorUnificado{% endblock %}

{% block layout %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a2e44 0%,#142336 50%,#0f1923 100%);font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,sans-serif;">
    <div style="width:100%;max-width:420px;margin:20px;background:#fff;border-radius:16px;padding:40px 36px;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
        <div style="text-align:center;margin-bottom:28px;">
            <img src="/static/img/logo_edx_dark.png" alt="EDX" style="height:44px;width:auto;max-width:160px;margin-bottom:12px;">
            <h4 style="margin:8px 0 4px;font-weight:700;color:#1a2e44;font-size:1.4rem;">ExtratorUnificado</h4>
            <p style="color:#6c7a89;font-size:0.9rem;margin:0;">Faça login para acessar o sistema</p>
        </div>

        {% if erro %}
        <div style="background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:0.9rem;">
            <i class="bi bi-exclamation-circle"></i> {{ erro }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div style="margin-bottom:16px;">
                <label for="email" style="display:block;font-weight:600;font-size:0.875rem;color:#2c3e50;margin-bottom:6px;">E-mail</label>
                <div style="position:relative;">
                    <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:1rem;">
                        <i class="bi bi-envelope"></i>
                    </span>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required autofocus
                           style="width:100%;padding:10px 12px 10px 40px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.95rem;outline:none;box-sizing:border-box;transition:border-color 0.2s;"
                           onfocus="this.style.borderColor='#5b9bd5';this.style.boxShadow='0 0 0 3px rgba(91,155,213,0.15)'"
                           onblur="this.style.borderColor='#e2e8f0';this.style.boxShadow='none'">
                </div>
            </div>

            <div style="margin-bottom:24px;">
                <label for="senha" style="display:block;font-weight:600;font-size:0.875rem;color:#2c3e50;margin-bottom:6px;">Senha</label>
                <div style="position:relative;">
                    <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:1rem;">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" id="senha" name="senha" placeholder="Sua senha" required
                           style="width:100%;padding:10px 12px 10px 40px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.95rem;outline:none;box-sizing:border-box;transition:border-color 0.2s;"
                           onfocus="this.style.borderColor='#5b9bd5';this.style.boxShadow='0 0 0 3px rgba(91,155,213,0.15)'"
                           onblur="this.style.borderColor='#e2e8f0';this.style.boxShadow='none'">
                </div>
            </div>

            <button type="submit"
                    style="width:100%;padding:12px;background:#2d5a8c;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background 0.2s;"
                    onmouseover="this.style.background='#5b9bd5'"
                    onmouseout="this.style.background='#2d5a8c'">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </button>
        </form>

        <p style="text-align:center;color:#94a3b8;font-size:0.8rem;margin-top:20px;margin-bottom:0;">
            ExtratorUnificado Web v1.0
        </p>
    </div>
</div>
{% endblock %}
